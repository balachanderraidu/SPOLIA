<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description"
    content="Spolia — The exclusive exchange for reclaimed construction materials. Verified architects, contractors, and vendors trade surplus materials, reduce costs, and cut carbon footprints.">
  <meta name="theme-color" content="#0D0D0D">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Spolia">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Spolia — The Second Life of Design">
  <meta property="og:description"
    content="The exclusive exchange for reclaimed construction materials. Verified professionals. Guaranteed quality. Measurable impact.">
  <meta property="og:image" content="/assets/og-image.jpg">

  <title>The Radar — Spolia</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- App Shell -->
  <div id="app" role="main">
    <!-- Screens are injected here by app.js -->

    <!-- Loading screen (shown before JS hydrates) -->
    <div id="splash-screen" style="
      position:fixed;inset:0;
      background:#0D0D0D;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:9999;transition:opacity 500ms ease">
      <div style="font-family:'Playfair Display',Georgia,serif;font-size:36px;font-weight:700;
        color:#FFD700;letter-spacing:2px;margin-bottom:8px">SPOLIA</div>
      <div
        style="font-family:Inter,sans-serif;font-size:12px;color:#5C5647;letter-spacing:0.15em;text-transform:uppercase">
        The Second Life of Design
      </div>
      <div style="margin-top:40px;display:flex;gap:6px">
        <div
          style="width:6px;height:6px;border-radius:50%;background:#FFD700;animation:dot-bounce 1.2s ease-in-out infinite">
        </div>
        <div
          style="width:6px;height:6px;border-radius:50%;background:#FFD700;animation:dot-bounce 1.2s ease-in-out 0.2s infinite">
        </div>
        <div
          style="width:6px;height:6px;border-radius:50%;background:#FFD700;animation:dot-bounce 1.2s ease-in-out 0.4s infinite">
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation (injected by app.js) -->
  <nav id="bottom-nav" class="bottom-nav" role="navigation" aria-label="Main navigation">
    <!-- populated by buildNav() in app.js -->
  </nav>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>

  <!-- PWA Install Banner (shown by app.js when beforeinstallprompt fires) -->
  <div id="install-banner" style="
    display:none;position:fixed;bottom:88px;left:16px;right:16px;z-index:999;
    background:linear-gradient(135deg,#1A1500,#1A1A0A);
    border:1px solid rgba(255,215,0,0.3);border-radius:16px;
    padding:14px 16px;align-items:center;gap:12px;
    box-shadow:0 8px 32px rgba(0,0,0,0.4)">
    <span style="font-size:28px">📲</span>
    <div style="flex:1">
      <div style="font:600 13px/1.2 Inter,sans-serif;color:#F5F0E8;margin-bottom:2px">Add Spolia to Home Screen</div>
      <div style="font:400 11px/1.3 Inter,sans-serif;color:#5C5647">Install the app for faster access</div>
    </div>
    <button id="install-btn" style="
      height:34px;padding:0 14px;border-radius:10px;border:none;
      background:#FFD700;color:#0D0D0D;font:600 12px/1 Inter,sans-serif;cursor:pointer;
      flex-shrink:0">Install</button>
    <button id="install-dismiss" style="
      width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.06);
      border:none;color:#5C5647;font-size:16px;cursor:pointer;flex-shrink:0;
      display:flex;align-items:center;justify-content:center">✕</button>
  </div>

  <!-- Firebase Phone Auth reCAPTCHA anchor (invisible, must exist in DOM) -->
  <div id="recaptcha-container" style="display:none;"></div>

  <!-- Inline splash animation keyframes -->
  <style>
    @keyframes dot-bounce {

      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      40% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }
  </style>

  <!-- Main Application -->
  <script type="module">
    // Import and initialize the app
    import('./app.js?v=2').then(() => {
      // Hide splash after screens render
      const splash = document.getElementById('splash-screen');
      if (splash) {
        setTimeout(() => {
          splash.style.opacity = '0';
          setTimeout(() => {
            splash.remove();
            // After splash is gone, show demo welcome if needed
            const isDemo = (()=>{ try { return localStorage.getItem('spolia_demo')==='1' || sessionStorage.getItem('spolia_demo')==='1'; } catch(e){ return false; }})();
            if (isDemo && !document.getElementById('spolia-welcome-overlay')) {
              const ov = document.createElement('div');
              ov.id = 'spolia-welcome-overlay';
              ov.style.cssText = 'position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;';
              ov.innerHTML = `<div style="background:#161616;width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:32px 24px;">
                <h2 style="font:700 24px/1.2 Inter,sans-serif;color:#FFD700;margin-bottom:16px;">Welcome to Spolia</h2>
                <p style="font:400 14px/1.6 Inter,sans-serif;color:#A09882;margin-bottom:24px;">You're exploring a live simulation of India's first exclusive exchange for reclaimed construction materials.</p>
                <ul style="list-style:none;padding:0;margin:0 0 32px;display:flex;flex-direction:column;gap:16px;">
                  <li style="display:flex;align-items:flex-start;gap:12px;"><span style="font-size:20px">🔴</span><div><strong style="color:#F5F0E8;display:block;margin-bottom:4px;">Rescue Expiries</strong><span style="color:#A09882;font-size:14px;">Find cement, paint and tiles before they go to landfill.</span></div></li>
                  <li style="display:flex;align-items:flex-start;gap:12px;"><span style="font-size:20px">📦</span><div><strong style="color:#F5F0E8;display:block;margin-bottom:4px;">Clear Surplus</strong><span style="color:#A09882;font-size:14px;">Buy pristine leftover marble and tiles from luxury projects.</span></div></li>
                  <li style="display:flex;align-items:flex-start;gap:12px;"><span style="font-size:20px">🔒</span><div><strong style="color:#F5F0E8;display:block;margin-bottom:4px;">Trade Safely</strong><span style="color:#A09882;font-size:14px;">Every transaction is backed by the Spolia Bond escrow.</span></div></li>
                </ul>
                <button id="spolia-welcome-close" style="width:100%;height:52px;border-radius:12px;background:#FFD700;color:#0D0D0D;border:none;font:600 15px/1 Inter,sans-serif;cursor:pointer;">Start Exploring</button>
              </div>`;
              document.body.appendChild(ov);
              document.getElementById('spolia-welcome-close').addEventListener('click', () => ov.remove());
            }
          }, 500);
        }, 800);
      }
    }).catch(err => {
      console.error('[Spolia] Failed to load app:', err);
      const splash = document.getElementById('splash-screen');
      if (splash) splash.innerHTML = `
        <div style="text-align:center;padding:32px">
          <div style="font-size:48px;margin-bottom:16px">⚠️</div>
          <div style="color:#F5F0E8;font-family:Inter,sans-serif;margin-bottom:8px">Failed to load Spolia</div>
          <div style="color:#5C5647;font-size:13px;margin-bottom:24px">${err.message}</div>
          <button onclick="location.reload()" style="background:#FFD700;color:#0D0D0D;border:none;padding:10px 24px;border-radius:12px;font:600 14px Inter;cursor:pointer">
            Retry
          </button>
        </div>`;
    });
  </script>

  <!-- Noscript fallback -->
  <noscript>
    <div
      style="position:fixed;inset:0;background:#0D0D0D;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;font-family:Inter,sans-serif">
      <div>
        <div style="font-size:36px;font-family:'Playfair Display',Georgia;color:#FFD700;margin-bottom:16px">SPOLIA</div>
        <p style="color:#A09882;font-size:14px">Spolia requires JavaScript to run. Please enable JavaScript in your
          browser settings.</p>
      </div>
    </div>
  </noscript>

</body>

</html>

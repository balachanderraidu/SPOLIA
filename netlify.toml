[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_ENABLED = "false"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=(self)"
    # CRITICAL: Firebase popup auth requires unsafe-none — 'same-origin' (Netlify default) kills the popup
    Cross-Origin-Opener-Policy = "unsafe-none"

# Service worker and HTML: never cache
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS — no-cache so code updates reach users immediately (no content-hash fingerprinting)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/components/*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Static assets can be cached longer
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ─────────────────────────────────────────────────────────────────────
# SPA Redirect — serve index.html for all routes so the JS router
# handles navigation. Without this, Netlify 404s on any direct URL.
# ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
